<!DOCTYPE html>
<html lang="en-US">
<head>
    <title>ABS - CCL Function Reference</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            font-size: 14px;
            line-height: 1.6;
            color: #172b4d;
            background: #fff;
            margin: 0;
            padding: 24px 32px;
            max-width: 860px;
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
            margin: 0 0 16px;
            padding-bottom: 8px;
            border-bottom: 2px solid #dfe1e6;
        }

        h2 {
            font-size: 16px;
            font-weight: 600;
            margin: 24px 0 8px;
            color: #172b4d;
        }

        p {
            margin: 0 0 12px;
        }

        pre {
            background: #f4f5f7;
            border: 1px solid #dfe1e6;
            border-radius: 4px;
            padding: 12px 16px;
            font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
            font-size: 13px;
            overflow-x: auto;
            margin: 0 0 16px;
            white-space: pre;
        }

        .metasymbol {
            background: #f4f5f7;
            border-left: 3px solid #0052cc;
            padding: 8px 12px;
            margin: 0 0 12px;
            border-radius: 0 4px 4px 0;
        }

        .metasymbol strong {
            font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <h1>ABS</h1>
    <p>The <code>ABS()</code> function returns the absolute value of a numeric expression.</p>

    <h2>Syntax</h2>
    <pre>ABS(numeric_expr)</pre>

    <h2>Metasymbol</h2>
    <div class="metasymbol">
        <strong>numeric_expr</strong><br>
        An expression that is an integer or real number.
    </div>

    <h2>Examples</h2>
    <p>In this example, if <code>Y = -10</code>, then <code>X = 10</code>.</p>
    <pre>X = ABS(Y)</pre>
</body>
</html>
